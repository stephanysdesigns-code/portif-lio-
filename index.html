<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Aroma</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f8f5f2;
  color:#333;
  text-align:center;
}

header{
  background:#6f4e37;
  color:white;
  padding:20px;
}

.banner img{
  width:100%;
  height:300px;
  object-fit:cover;
  display:block;
}

section{
  padding:30px 15px;
}

.produtos{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.produto{
  background:white;
  width:280px;
  padding:15px;
  border-radius:15px;
}

.produto img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

.produto h3{
  margin-top:10px;
}

.produto p{
  margin-top:5px;
}

footer{
  background:#6f4e37;
  color:white;
  padding:15px;
  margin-top:30px;
}

@media (max-width:600px){

  .banner img{
    height:200px;
  }

  .produto{
    width:90%;
  }

}
</style>
</head>

<body>

<header>
  <h1>Café Aroma</h1>
</header>

<section class="banner">
  <img src="20260607_104425_0000.png" alt="Banner Café Aroma">
</section>

<section>
  <h2>Sobre Nós</h2>
  <br>
  <p>Servimos cafés especiais desde 2020.</p>
</section>

<section>
  <h2>Cardápio</h2>
  <br>

  <div class="produtos">

    <div class="produto">
      <img src="20260607_104407_0002.png" alt="Cappuccino">
      <h3>Cappuccino</h3>
      <p>R$ 12</p>
    </div>

    <div class="produto">
      <img src="20260607_104407_0001.png" alt="Chás">
      <h3>Chás</h3>
      <p>R$ 8</p>
    </div>

    <div class="produto">
      <img src="20260607_104406_0000.png" alt="Cafés Gelados">
      <h3>Cafés Gelados</h3>
      <p>R$ 13</p>
    </div>

  </div>

</section>

<footer>
  <p>Contato: contato@cafearoma.com</p>
</footer>

</body>
</html>
